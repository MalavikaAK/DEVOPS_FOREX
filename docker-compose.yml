version: '3.8'

services:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forex_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example   # Rename to .env for real secrets
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/forexdb
    depends_on:
      - mongodb
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: forex_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: forex_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ── Prometheus (Monitoring) ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: forex_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  # ── Grafana (Dashboards) ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: forex_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin   # Change this!
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  mongo_data:
  grafana_data:
